 name: Neuro-Sarc Paper Alert
 
 on:
   schedule:
-    - cron: '0 23 * * 0,2,4'
+    # 월/수/토 UTC 00:00 실행 (필요시 KST 시간대로 조정 가능)
+    - cron: '0 0 * * 1,3,6'
   workflow_dispatch:
 
 env:
   FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
 
 jobs:
   send-alert:
     runs-on: ubuntu-latest
 
     steps:
       - name: Checkout repository
         uses: actions/checkout@v4
 
       - name: Set up Python
         uses: actions/setup-python@v5
         with:
           python-version: '3.10'
 
       - name: Install dependencies
         run: |
           python -m pip install --upgrade pip
-          pip install google-generativeai biopython
+          pip install -r requirements.txt
-      - name: Run daily alert script
+      - name: Run alert script
         env:
         -          GOOGLE_API_KEY: ${{ secrets.GEMINI_API_KEY }}
-          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
+          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
           GMAIL_USER: ${{ secrets.GMAIL_USER }}
           GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
           TO_EMAIL: ${{ secrets.TO_EMAIL }}
           NCBI_EMAIL: ${{ secrets.NCBI_EMAIL }}
+          ENFORCE_MWS_SCHEDULE: 'true'
         run: python pubmed_alert.py
