name: Neuro-Sarc Paper Alert

on:
  schedule:
    - cron: '0 23 * * 0,2,4'
  workflow_dispatch:

# Node.js 20 경고 메시지를 없애기 위한 환경 변수 설정
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  send-alert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-generativeai biopython

      - name: Check files in repository
        run: ls -la  # 에러 원인 파악을 위해 현재 폴더의 파일 목록을 출력합니다.

      - name: Run daily alert script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
          NCBI_EMAIL: ${{ secrets.NCBI_EMAIL }}
        run: python pubmed_alert.py
