name: PubMed Weekly Alert

on:
  schedule:
    # 월요일 09:00 KST = 일요일 00:00 UTC
    - cron: '0 0 * * 1'
    # 수요일 09:00 KST = 화요일 00:00 UTC
    - cron: '0 0 * * 3'
    # 토요일 09:00 KST = 금요일 00:00 UTC
    - cron: '0 0 * * 6'
  workflow_dispatch:   # 수동 실행 허용

jobs:
  send-alert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install biopython google-generativeai

      - name: Run PubMed alert script
        env:
          GOOGLE_API_KEY:      ${{ secrets.GOOGLE_API_KEY }}
          GMAIL_USER:          ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD:  ${{ secrets.GMAIL_APP_PASSWORD }}
          TO_EMAIL:            ${{ secrets.TO_EMAIL }}
          NCBI_EMAIL:          ${{ secrets.NCBI_EMAIL }}
        run: python pubmed_alert.py

